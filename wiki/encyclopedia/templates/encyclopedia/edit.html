{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit {{ title }}
{% endblock %}

{% block body %}
    <h1>Edit {{ title }}</h1>
    <form action="{% url 'edit' title %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <textarea class="form-control" name="content" rows="15" required>{% for line in contents %}{{ line }}{% endfor %}</textarea>
        </div>
        <button type="submit" class="btn btn-success">Save Changes</button>
    </form>
{% endblock %}
