{% extends "encyclopedia/layout.html" %}

{% block title %}
    Create New Page
{% endblock %}

{% block body %}
    <h1>Create a New Page</h1>
    <form action="{% url 'newpage' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" class="form-control" name="title" placeholder="Page Title" required>
        </div>
        <div class="form-group">
            <textarea class="form-control" name="content" rows="10" placeholder="Enter Markdown Content" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Page</button>
    </form>
{% endblock %}
