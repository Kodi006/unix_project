{% extends "encyclopedia/layout.html" %}

{% block title %}
    {{ title }}
{% endblock %}

{% block body %}
    <div class="wiki-content">
        {% for line in k %}
            {{ line|safe }}
        {% endfor %}
    </div>
    <hr>
    <a href="{% url 'edit' title %}" class="btn btn-secondary">Edit Page</a>
{% endblock %}
